repos:
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.9.0
    hooks:
      - id: shellcheck
        files: \.(sh|bash)$
        args: [--severity=warning]

  - repo: local
    hooks:
      - id: atlas-tests
        name: Run Atlas tests
        entry: make test
        language: system
        pass_filenames: false
